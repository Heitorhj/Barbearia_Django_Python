<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Barbearia Uninassau{% endblock %}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e5e5e5; min-height: 100vh; }
  nav { background: #1a1a1a; border-bottom: 2px solid #c9a84c; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
  nav a { color: #c9a84c; text-decoration: none; margin-left: 1rem; font-weight: 500; }
  nav a:hover { color: #fff; }
  .logo { font-size: 1.5rem; font-weight: 800; color: #c9a84c; letter-spacing: 2px; }
  .container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 2rem; margin-bottom: 1.5rem; }
  .btn { display: inline-block; padding: .6rem 1.4rem; border-radius: 6px; border: none; cursor: pointer; font-size: .95rem; font-weight: 600; text-decoration: none; }
  .btn-primary { background: #c9a84c; color: #000; }
  .btn-primary:hover { background: #e6bf6a; }
  .btn-danger { background: #ef4444; color: #fff; }
  .btn-secondary { background: #333; color: #ccc; }
  .form-group { margin-bottom: 1.2rem; }
  .form-group label { display: block; margin-bottom: .4rem; color: #aaa; font-size: .9rem; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: .6rem .8rem; background: #111; border: 1px solid #333;
    color: #e5e5e5; border-radius: 6px; font-size: 1rem;
  }
  .form-group input:focus, .form-group select:focus { border-color: #c9a84c; outline: none; }
  .msg { padding: .8rem 1rem; border-radius: 6px; margin-bottom: 1rem; }
  .msg-success { background: #064e3b; color: #6ee7b7; }
  .msg-error { background: #7f1d1d; color: #fca5a5; }
  .msg-info { background: #1e3a5f; color: #93c5fd; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: .78rem; font-weight: 700; }
  .badge-pendente { background: #78350f; color: #fcd34d; }
  .badge-confirmado { background: #1e3a5f; color: #93c5fd; }
  .badge-concluido { background: #064e3b; color: #6ee7b7; }
  .badge-cancelado { background: #450a0a; color: #fca5a5; }
  h1, h2 { color: #c9a84c; margin-bottom: 1rem; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: .7rem 1rem; border-bottom: 1px solid #2a2a2a; text-align: left; }
  th { color: #c9a84c; font-size: .85rem; text-transform: uppercase; letter-spacing: 1px; }
  .steps { display: flex; gap: 1rem; margin-bottom: 2rem; }
  .step { flex: 1; padding: .5rem; text-align: center; border-radius: 6px; background: #222; font-size: .85rem; }
  .step.active { background: #c9a84c; color: #000; font-weight: 700; }
</style>
</head>
<body>
<nav>
  <span class="logo">✂ Barbearia Uninassau</span>
  <div>
    <a href="{% url 'home' %}">Início</a>
    <a href="{% url 'lista_servicos' %}">Serviços</a>
    {% if user.is_authenticated %}
      <a href="{% url 'meus_agendamentos' %}">Meus Agendamentos</a>
      <a href="{% url 'agendar_step1' %}">Agendar</a>
      {% if user.barbeiro %}
        <a href="{% url 'dashboard_barbeiro' %}">Dashboard</a>
      {% endif %}
      <form method="post" action="{% url 'logout' %}" style="display:inline">
        {% csrf_token %}
        <button type="submit" style="background:none;border:none;color:#c9a84c;cursor:pointer;font-size:1rem;font-weight:500;padding:0;margin-left:1rem">Sair ({{ user.first_name }})</button>
      </form>
    {% else %}
      <a href="{% url 'login' %}">Entrar</a>
      <a href="{% url 'registro' %}">Cadastrar</a>
    {% endif %}
  </div>
</nav>
 
<div class="container">
  {% for msg in messages %}
    <div class="msg msg-{{ msg.tags }}">{{ msg }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
